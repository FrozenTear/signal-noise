name: deploy

# Redeploy the bearer-gated signal-noise binary to the live VPS (THE-198) from a
# GitHub-hosted runner, which can reach the VPS over SSH (the agent sandbox cannot
# — its egress to 194.163.163.153 is IP-blocked; see THE-156 / THE-157).
#
# This closes the live unauthenticated-writes gap: the gate (THE-159) is in source
# on master but the running binary predates it, so POST /api/articles {} currently
# returns 422 (handler validation) instead of 503 (fail-closed). After this runs,
# the live binary is the gated build and SEED_API_TOKEN is set in the unit env.
#
# Required repository secrets (one-time operator bootstrap — agents cannot install
# a key onto a host they cannot yet log into):
#   DEPLOY_SSH_KEY   private key whose public half is in the VPS deploy user's
#                    authorized_keys, with sudo rights for the redeploy script.
#                    (matching pubkey generated by Console: paperclip-deploy@ainory-times)
#   DEPLOY_HOST      VPS ssh host (e.g. news.scuffedcrew.no or its public IP)
#   DEPLOY_USER      ssh user (must be able to run scripts/redeploy-host.sh as root)
#   SEED_API_TOKEN   the bearer secret; written into the systemd unit by the script
#                    AND reused by deploy-seed.yml so both paths share one token.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'type "deploy" to confirm a live redeploy'
        required: true
        default: ''

concurrency:
  group: live-deploy
  cancel-in-progress: false

jobs:
  redeploy:
    if: ${{ inputs.confirm == 'deploy' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start ssh-agent
        run: |
          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" | ssh-add -
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Run host redeploy (build -> stage -> symlink -> restart -> verify gate)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          SEED_API_TOKEN: ${{ secrets.SEED_API_TOKEN }}
        run: |
          test -n "$SEED_API_TOKEN" || { echo "SEED_API_TOKEN secret is empty"; exit 1; }
          # Ship the script and run it as root with the token in the environment.
          scp -o StrictHostKeyChecking=accept-new scripts/redeploy-host.sh \
            "$DEPLOY_USER@$DEPLOY_HOST:/tmp/redeploy-host.sh"
          ssh -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$DEPLOY_HOST" \
            "sudo SEED_API_TOKEN='$SEED_API_TOKEN' bash /tmp/redeploy-host.sh; rc=\$?; rm -f /tmp/redeploy-host.sh; exit \$rc"

      - name: Public gate assertion (independent of host)
        env:
          SEED_API_TOKEN: ${{ secrets.SEED_API_TOKEN }}
        run: |
          BASE=https://news.scuffedcrew.no
          no=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$BASE/api/articles" -H 'Content-Type: application/json' -d '{}')
          wrong=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$BASE/api/articles" -H 'Authorization: Bearer nope' -d '{}')
          echo "live POST {} no-bearer    -> $no   (expect 503)"
          echo "live POST {} wrong-bearer -> $wrong (expect 401/403)"
          [ "$no" = "503" ] || { echo "FAIL: live writes still un-gated"; exit 1; }
          case "$wrong" in 401|403) ;; *) echo "FAIL: wrong token not rejected"; exit 1;; esac
          echo "OK: live write endpoint is gated."
