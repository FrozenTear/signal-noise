# ─── Scanner config ──────────────────────────────────────────────────────────

[scanner]
# Minimum time between polls per feed (seconds)
poll_interval_sec = 3600
# Similarity threshold for deduplication (0.0–1.0)
dedup_threshold = 0.85
# Max candidates to surface per heartbeat (total across all beats)
max_candidates_per_run = 15
# Max candidates per individual beat per heartbeat (enforces balanced coverage)
max_candidates_per_beat = 3

# ─── gnews.io Discovery Channel ────────────────────────────────────────────

[gnews]
# API key: get from gnews.io account (start with free tier)
api_key = "GNEWS_API_KEY_HERE"
# Tier: "free" (dev) or "essential" (€50/mo, launch)
tier = "free"
# Beat-specific queries for article discovery
# Use narrow, on-topic keywords to stay within daily quota (100 req/day, 10 articles/req max)
queries = [
  { beat = "linux", q = "Linux kernel distribution open source", limit = 5 },
  { beat = "tech", q = "tech startup software engineering developer tools", limit = 5 },
  { beat = "privacy", q = "privacy surveillance data protection encryption", limit = 5 },
  { beat = "privacy", q = "EU chat control CSAM scanning encryption regulation", limit = 5 },
  { beat = "ai_society", q = "artificial intelligence society impact ethics bias fairness", limit = 5 },
  { beat = "ai_policy", q = "AI regulation policy EU AI Act governance accountability", limit = 5 },
  { beat = "ai_creative", q = "AI art creativity copyright generative music film", limit = 5 }
]
